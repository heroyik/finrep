<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="10; url=https://heroyik.gitlab.io/finrep/">
    <title>Finrep moved to GitLab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #12161c;
            --panel: #161a21;
            --line: #3a404b;
            --text: #f5f1e8;
            --muted: #d7d0c5;
            --green: #46eba1;
            --orange: #fca326;
            --orange-dark: #e24329;
            --shadow: rgba(70, 235, 161, 0.18);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            min-height: 100%;
        }

        body {
            margin: 0;
            padding: 6px;
            color: var(--text);
            font-family: "Inter", Arial, sans-serif;
            background:
                radial-gradient(circle at 0 0, rgba(70, 235, 161, 0.1), transparent 28rem),
                var(--bg);
        }

        main {
            min-height: calc(100vh - 12px);
            display: flex;
            align-items: center;
            border: 1px solid var(--line);
            border-radius: 14px;
            background: linear-gradient(145deg, #171b22 0%, #12161c 68%);
            box-shadow: inset 0 0 0 1px rgba(245, 241, 232, 0.04);
        }

        .wrap {
            width: min(1160px, 100%);
            padding: clamp(40px, 7vw, 90px);
        }

        .eyebrow {
            margin: 0 0 34px;
            color: var(--green);
            font-size: clamp(1rem, 2.1vw, 1.6rem);
            font-weight: 800;
            letter-spacing: 0.18em;
            text-transform: uppercase;
        }

        h1 {
            margin: 0 0 24px;
            color: var(--text);
            font-size: clamp(4rem, 10vw, 8.4rem);
            font-weight: 900;
            line-height: 0.95;
            letter-spacing: 0;
        }

        .copy {
            max-width: 980px;
            margin: 0;
            color: var(--muted);
            font-size: clamp(1.35rem, 3vw, 2.1rem);
            font-weight: 500;
            line-height: 1.55;
        }

        .copy strong {
            color: var(--text);
            font-weight: 800;
        }

        .route {
            display: flex;
            align-items: center;
            gap: clamp(28px, 6vw, 56px);
            margin: 56px 0 54px;
        }

        .brand-mark {
            width: clamp(64px, 9vw, 88px);
            height: clamp(64px, 9vw, 88px);
            flex: 0 0 auto;
        }

        .arrow {
            width: clamp(116px, 18vw, 160px);
            height: clamp(36px, 5vw, 54px);
            filter: drop-shadow(0 0 14px var(--shadow));
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 96px;
            min-width: min(424px, 100%);
            padding: 24px 40px;
            border: 0;
            border-radius: 14px;
            color: #061015;
            background: var(--green);
            font-size: clamp(1.35rem, 2.5vw, 1.9rem);
            font-weight: 900;
            text-decoration: none;
            box-shadow: 0 18px 42px rgba(70, 235, 161, 0.18);
            transition: transform 160ms ease, box-shadow 160ms ease;
        }

        .button:hover,
        .button:focus-visible {
            transform: translateY(-2px);
            box-shadow: 0 22px 52px rgba(70, 235, 161, 0.24);
            outline: none;
        }

        .note {
            margin: 32px 0 0;
            color: var(--muted);
            font-size: clamp(1.1rem, 2.4vw, 1.75rem);
            line-height: 1.45;
        }

        @media (max-width: 620px) {
            body {
                padding: 0;
            }

            main {
                min-height: 100vh;
                border-radius: 0;
                border-left: 0;
                border-right: 0;
            }

            .wrap {
                padding: 34px 24px;
            }

            .route {
                gap: 18px;
                margin: 42px 0;
            }

            .button {
                width: 100%;
                min-height: 76px;
                padding: 20px 24px;
            }
        }
    </style>
</head>
<body>
    <main>
        <section class="wrap" aria-label="Finrep moved to GitLab">
            <p class="eyebrow">New spot just dropped</p>
            <h1>GitLab era.</h1>
            <p class="copy">
                Big love, GitHub. You held it down. As of June 10, 2026, heroyik is
                pulling up at <strong>heroyik.gitlab.io</strong> now. Chill for 10 seconds and I will
                slide you over.
            </p>

            <div class="route" aria-hidden="true">
                <svg class="brand-mark" viewBox="0 0 96 96" role="img" aria-label="GitHub">
                    <circle cx="48" cy="48" r="48" fill="#f5f1e8"/>
                    <path fill="#161a21" d="M48 16c-17.8 0-32.2 14.4-32.2 32.2 0 14.2 9.2 26.3 22 30.6 1.6.3 2.2-.7 2.2-1.6v-6c-9 2-10.9-3.8-10.9-3.8-1.5-3.7-3.6-4.7-3.6-4.7-2.9-2 .2-2 .2-2 3.2.2 5 3.3 5 3.3 2.9 4.9 7.5 3.5 9.3 2.7.3-2.1 1.1-3.5 2-4.3-7.2-.8-14.7-3.6-14.7-15.9 0-3.5 1.3-6.4 3.3-8.7-.3-.8-1.4-4.1.3-8.5 0 0 2.7-.9 8.9 3.3 2.6-.7 5.3-1.1 8.1-1.1 2.7 0 5.5.4 8.1 1.1 6.1-4.2 8.8-3.3 8.8-3.3 1.8 4.4.7 7.7.3 8.5 2.1 2.3 3.3 5.2 3.3 8.7 0 12.4-7.6 15.1-14.8 15.9 1.2 1 2.2 3 2.2 6v8.8c0 .9.6 1.9 2.2 1.6 12.8-4.3 22-16.4 22-30.6C80.2 30.4 65.8 16 48 16Z"/>
                </svg>

                <svg class="arrow" viewBox="0 0 170 56" role="img" aria-label="To">
                    <path d="M4 32C49 7 93 21 151 31" fill="none" stroke="#46eba1" stroke-width="7" stroke-linecap="round"/>
                    <path d="M126 12l35 22-39 12" fill="none" stroke="#46eba1" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>

                <svg class="brand-mark" viewBox="0 0 96 96" role="img" aria-label="GitLab">
                    <path fill="var(--orange)" d="M48 82 18.6 60.7a5.7 5.7 0 0 1-2.1-6.4l6.8-20.9h15.1L48 82Z"/>
                    <path fill="#fc6d26" d="M48 82 38.4 33.4h19.2L48 82Z"/>
                    <path fill="var(--orange)" d="m48 82 29.4-21.3a5.7 5.7 0 0 0 2.1-6.4l-6.8-20.9H57.6L48 82Z"/>
                    <path fill="var(--orange-dark)" d="M23.3 33.4 30.4 12c.8-2.5 4.3-2.5 5.1 0l2.9 21.4H23.3Zm34.3 0L60.5 12c.8-2.5 4.3-2.5 5.1 0l7.1 21.4H57.6Z"/>
                </svg>
            </div>

            <a class="button" href="https://heroyik.gitlab.io/finrep/">Pull up on GitLab now</a>
            <p class="note">Ten seconds is optional. The new spot is already live.</p>
        </section>
    </main>

    <script>
        const destination = "https://heroyik.gitlab.io/finrep/";

        window.setTimeout(() => {
            window.location.assign(destination);
        }, 10000);
    </script>
</body>
</html>
